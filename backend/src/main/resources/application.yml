server:
  port: ${PORT:8080}

spring:
  application:
    name: anomanet

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/anomanet}
    username: ${POSTGRES_USER:anomanet}
    password: ${POSTGRES_PASSWORD:anomanet2024}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  neo4j:
    uri: ${NEO4J_URI:neo4j+s://25be8718.databases.neo4j.io}
    authentication:
      username: ${NEO4J_USER:25be8718}
      password: ${NEO4J_PASSWORD:***REMOVED***}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:d8642r0hvfrjvm53hfug.any.us-east-1.mpx.prd.cloud.redpanda.com:9092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      properties:
        security.protocol: SASL_SSL
        sasl.mechanism: SCRAM-SHA-256
        sasl.jaas.config: >
          org.apache.kafka.common.security.scram.ScramLoginModule required
          username="${KAFKA_SASL_USERNAME:anomanet}"
          password="${KAFKA_SASL_PASSWORD:***REMOVED***}";
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        security.protocol: SASL_SSL
        sasl.mechanism: SCRAM-SHA-256
        sasl.jaas.config: >
          org.apache.kafka.common.security.scram.ScramLoginModule required
          username="${KAFKA_SASL_USERNAME:anomanet}"
          password="${KAFKA_SASL_PASSWORD:***REMOVED***}";

  websocket:
    message-size-limit: 131072

jwt:
  secret: ${JWT_SECRET:***REMOVED***}
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000

kafka:
  topics:
    raw-transactions: raw.transactions
    ml-scoring-queue: ml.scoring.queue
    alerts-generated: alerts.generated

ml:
  service:
    url: ${ML_SERVICE_URL:http://localhost:8000}

anomanet:
  threshold:
    anoma-score: ${ANOMASCORE_THRESHOLD:0.65}
    pep: ${PEP_THRESHOLD:0.45}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs